### model
### model
model_name_or_path: Qwen/Qwen2.5-Omni-7B
template: qwen2_omni
trust_remote_code: true

### dataset
dataset: schwan_icep_labelpredictor_train
dataset_dir: data/llamafactory
cutoff_len: 8192
preprocessing_num_workers: 8

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true

### output
output_dir: ../models/qwen2_omni/icep_labelpredictor_full
logging_steps: 25
save_steps: 200
overwrite_output_dir: true
report_to: wandb

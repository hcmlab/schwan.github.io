### model
model_name_or_path: Qwen/Qwen2.5-Omni-7B
template: qwen2_omni
output_dir: ../models/qwen2_omni/icep_labelpredictor_smoketest/eval_results
trust_remote_code: true

### dataset
eval_dataset: schwan_icep_labelpredictor_test
dataset_dir: data/llamafactory
cutoff_len: 8192

### method
stage: sft
do_predict: true
finetuning_type: lora
overwrite_cache: true

### eval
per_device_eval_batch_size: 1
predict_with_generate: true

### generation
max_new_tokens: 512
temperature: 0.1
top_p: 0.9

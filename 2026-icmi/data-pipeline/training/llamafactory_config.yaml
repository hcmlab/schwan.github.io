model_name_or_path: Qwen/Qwen2.5-Omni-7B
stage: sft
do_train: true
finetuning_type: lora
lora_target: all

# Dataset Configuration
dataset_dir: X:\data\Schwan_T3_FineTune
dataset: icep_omni_train
eval_dataset: icep_omni_val
template: qwen2_vl # Check if qwen2_vl or qwen2_audio template is required for Omni in LlamaFactory, currently qwen2_vl is typical.
cutoff_len: 2048
max_samples: 100000
overwrite_cache: true
preprocessing_num_workers: 16

# Outputs
output_dir: saves/qwen2.5-omni/lora/sft
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true

# Training Hyperparameters
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

# Evaluation
val_size: 0.1
per_device_eval_batch_size: 4
eval_strategy: steps
eval_steps: 500
